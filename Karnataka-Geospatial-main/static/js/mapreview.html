<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Karnataka GeoJSON CRUD Map</title>

    <!-- LEAFLET CSS -->

    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />

    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 0;

        font-family: Arial, sans-serif;

        background: #f5f5f5;
      }

      h1 {
        text-align: center;

        padding: 15px;

        margin: 0;

        background: #2c3e50;

        color: white;
      }

      #map {
        height: 70vh;
        width: 100%;
      }

      #controls {
        padding: 15px;

        background: white;
      }

      .button-group {
        display: flex;

        gap: 10px;

        flex-wrap: wrap;

        margin-bottom: 15px;
      }

      button {
        width: 100px;

        padding: 8px 12px;

        border: none;

        border-radius: 6px;

        background: #3498db;

        color: white;

        cursor: pointer;

        display: flex;

        align-items: center;

        justify-content: center;

        font-size: 14px;

        transition: 0.2s;
      }

      button:hover {
        background: #2980b9;
      }

      input,
      textarea {
        width: 100%;

        padding: 10px;

        margin-top: 5px;
        margin-bottom: 15px;

        border-radius: 6px;

        border: 1px solid #ccc;

        font-size: 14px;
      }

      textarea {
        resize: vertical;
      }

      .feature-card {
        background: white;

        border: 1px solid #ddd;

        border-radius: 6px;

        padding: 12px;

        margin-bottom: 10px;

        cursor: pointer;

        transition: 0.2s;
      }

      .feature-card:hover {
        background: #f0f8ff;
      }

      #featureInfo {
        display: none;

        padding: 12px;

        margin-bottom: 15px;

        background: #ecf7ff;

        border-left: 4px solid #3498db;

        border-radius: 6px;
      }

      form {
        margin-top: 20px;
      }

      label {
        font-weight: bold;
      }

      /* SEARCH DROPDOWN */

      #searchDropdown {
        position: relative;

        background: white;

        border-radius: 6px;

        overflow: hidden;

        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);

        margin-top: -10px;

        margin-bottom: 15px;

        max-height: 250px;

        overflow-y: auto;

        display: none;
      }

      .dropdown-item {
        padding: 10px;

        cursor: pointer;

        border-bottom: 1px solid #eee;

        transition: 0.2s;
      }

      .dropdown-item:hover {
        background: #f0f8ff;
      }

      /* LOADER */

      #searchLoader {
        display: none;

        padding: 10px;

        font-size: 24px;

        color: #3498db;
      }

      #searchLoader span {
        animation: blink 1.4s infinite;
      }

      #searchLoader span:nth-child(2) {
        animation-delay: 0.2s;
      }

      #searchLoader span:nth-child(3) {
        animation-delay: 0.4s;
      }

      @keyframes blink {
        0% {
          opacity: 0.2;
        }

        20% {
          opacity: 1;
        }

        100% {
          opacity: 0.2;
        }
      }
    </style>
  </head>

  <body>
    <h1>Karnataka GeoJSON CRUD Map</h1>

    <!-- MAP -->

    <div id="map"></div>

    <!-- CONTROLS -->

    <div id="controls">
      <!-- BUTTONS -->

      <div class="button-group">
        <button id="zoomIn">Zoom In</button>

        <button id="zoomOut">Zoom Out</button>

        <button id="fitBounds">Fit Bounds</button>
      </div>

      <!-- SEARCH -->

      <input type="text" id="searchFeatures" placeholder="Search features..." />

      <div id="searchDropdown"></div>

      <div id="searchLoader">
        <span>.</span>
        <span>.</span>
        <span>.</span>
      </div>

      <!-- FEATURE LIST -->

      <div id="featureList"></div>

      <!-- FEATURE INFO -->

      <div id="featureInfo"></div>

      <!-- FORM -->

      <form id="featureForm">
        <label> Feature Name: </label>

        <input type="text" id="featureName" required />

        <label> Geometry (GeoJSON): </label>

        <textarea id="featureGeometry" rows="8" required></textarea>

        <div class="button-group">
          <button type="submit">Save</button>

          <button type="button" id="deleteFeature" style="display: none">
            Delete
          </button>
        </div>
      </form>
    </div>

    <!-- LEAFLET JS -->

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
      // ---------------------------------
      // CONFIG
      // ---------------------------------

      const API_BASE_URL = "http://localhost:8000";

      let selectedFeatureId = null;

      // ---------------------------------
      // MAP INIT
      // ---------------------------------

      const map = L.map("map").setView([15.3173, 75.7139], 7);

      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        attribution: "© OpenStreetMap contributors",
      }).addTo(map);

      // ---------------------------------
      // GEOJSON LAYER
      // ---------------------------------

      const featuresLayer = L.geoJSON(null, {
        style: {
          color: "#3498db",

          weight: 2,

          opacity: 0.8,

          fillOpacity: 0.35,
        },

        onEachFeature: (feature, layer) => {
          layer.bindPopup(
            `
                            <strong>
                                ${feature.properties.name}
                            </strong>
                            <br>
                            ID:
                            ${feature.properties.id}
                            `,
          );

          layer.on({
            mouseover: highlightFeature,

            mouseout: resetHighlight,

            click: (e) => {
              showFeatureInfo(e);

              selectFeature(feature);
            },
          });
        },
      }).addTo(map);

      // ---------------------------------
      // HIGHLIGHT
      // ---------------------------------

      function highlightFeature(e) {
        e.target.setStyle({
          weight: 3,

          color: "#e74c3c",

          fillOpacity: 0.6,
        });
      }

      // ---------------------------------
      // RESET
      // ---------------------------------

      function resetHighlight(e) {
        featuresLayer.resetStyle(e.target);
      }

      // ---------------------------------
      // FEATURE INFO
      // ---------------------------------

      function showFeatureInfo(e) {
        const feature = e.target.feature;

        const info = document.getElementById("featureInfo");

        info.innerHTML = `

                <strong>
                    ${feature.properties.name}
                </strong>

                <br>

                ID:
                ${feature.properties.id}

            `;

        info.style.display = "block";
      }

      // ---------------------------------
      // LOAD FEATURES
      // ---------------------------------

      async function loadFeatures() {
        try {
          const response = await fetch(`${API_BASE_URL}/features/geojson/all`);

          if (!response.ok) {
            throw new Error("Failed to load features");
          }

          const data = await response.json();

          console.log(data);

          featuresLayer.clearLayers();

          featuresLayer.addData(data);

          document.getElementById("featureList").innerHTML = "";

          // CREATE CARDS

          data.features.forEach((feature) => {
            const card = document.createElement("div");

            card.className = "feature-card";

            card.innerHTML = `
                        <h4>
                            ${feature.properties.name}
                        </h4>
                    `;

            // CARD CLICK

            card.addEventListener("click", () => {
              const layer = L.geoJSON(feature);

              map.fitBounds(layer.getBounds());

              featuresLayer.eachLayer((existingLayer) => {
                featuresLayer.resetStyle(existingLayer);
              });

              featuresLayer.eachLayer((existingLayer) => {
                if (
                  existingLayer.feature.properties.id === feature.properties.id
                ) {
                  existingLayer.setStyle({
                    color: "#e74c3c",

                    weight: 4,

                    fillOpacity: 0.7,
                  });

                  existingLayer.openPopup();
                }
              });

              selectFeature(feature);
            });

            document.getElementById("featureList").appendChild(card);
          });

          if (data.features.length > 0) {
            map.fitBounds(featuresLayer.getBounds());
          }
        } catch (error) {
          console.error(error);

          alert(error.message);
        }
      }

      // ---------------------------------
      // SEARCH WITH LOADER
      // ---------------------------------

      document
        .getElementById("searchFeatures")
        .addEventListener("input", (e) => {
          const term = e.target.value.toLowerCase();

          const dropdown = document.getElementById("searchDropdown");

          const loader = document.getElementById("searchLoader");

          loader.style.display = "block";

          dropdown.style.display = "none";

          setTimeout(() => {
            loader.style.display = "none";

            dropdown.innerHTML = "";

            if (!term) {
              dropdown.style.display = "none";

              return;
            }
            const matchedFeatures = document.querySelectorAll(".feature-card");

            matchedFeatures.forEach((card) => {
              const text = card.textContent.toLowerCase();
              if (text.includes(term)) {
                const item = document.createElement("div");

                item.className = "dropdown-item";
                item.textContent = card.textContent;

                // AUTO SHOW FEATURE ON MAP
                const matchingFeature = Array.from(
                  featuresLayer.getLayers(),
                ).find((layer) => {
                  return (
                    layer.feature.properties.name.toLowerCase() === text.trim()
                  );
                });

                if (matchingFeature) {
                  // Zoom to polygon

                  map.fitBounds(matchingFeature.getBounds());

                  // Reset all styles
                  featuresLayer.eachLayer((existingLayer) => {
                    featuresLayer.resetStyle(existingLayer);
                  });

                  // Highlight polygon

                  matchingFeature.setStyle({
                    color: "#e74c3c",
                    weight: 4,
                    fillOpacity: 0.7,
                  });
                  matchingFeature.openPopup();
                }

                // CLICK DROPDOWN ITEM

                item.addEventListener("click", () => {
                  card.click();
                  dropdown.style.display = "none";
                });
                dropdown.appendChild(item);
              }
            });
            dropdown.style.display = dropdown.children.length
              ? "block"
              : "none";
          }, 500);
        });

      // ---------------------------------
      // SELECT FEATURE
      // ---------------------------------

      function selectFeature(feature) {
        selectedFeatureId = feature.properties.id;

        document.getElementById("featureName").value = feature.properties.name;

        document.getElementById("featureGeometry").value = JSON.stringify(
          feature.geometry,
          null,
          2,
        );

        document.getElementById("deleteFeature").style.display = "flex";
      }

      // ---------------------------------
      // CLEAR FORM
      // ---------------------------------

      function clearForm() {
        selectedFeatureId = null;

        document.getElementById("featureName").value = "";

        document.getElementById("featureGeometry").value = "";

        document.getElementById("deleteFeature").style.display = "none";
      }

      // ---------------------------------
      // SAVE FEATURE
      // ---------------------------------

      async function handleFeatureSubmit(e) {
        e.preventDefault();

        try {
          const url = selectedFeatureId
            ? `${API_BASE_URL}/features/${selectedFeatureId}`
            : `${API_BASE_URL}/features/`;

          const method = selectedFeatureId ? "PUT" : "POST";

          const response = await fetch(url, {
            method,

            headers: {
              "Content-Type": "application/json",
            },

            body: JSON.stringify({
              name: document.getElementById("featureName").value,

              geometry: JSON.parse(
                document.getElementById("featureGeometry").value,
              ),
            }),
          });

          if (!response.ok) {
            throw new Error("Failed to save feature");
          }

          alert("Feature saved successfully");

          clearForm();

          loadFeatures();
        } catch (error) {
          console.error(error);

          alert(error.message);
        }
      }

      // ---------------------------------
      // DELETE FEATURE
      // ---------------------------------

      async function handleFeatureDelete() {
        if (!selectedFeatureId) return;

        try {
          const response = await fetch(
            `${API_BASE_URL}/features/${selectedFeatureId}`,

            {
              method: "DELETE",
            },
          );

          if (!response.ok) {
            throw new Error("Failed to delete feature");
          }

          alert("Feature deleted");

          clearForm();

          loadFeatures();
        } catch (error) {
          console.error(error);

          alert(error.message);
        }
      }

      // ---------------------------------
      // MAP CONTROLS
      // ---------------------------------

      document
        .getElementById("zoomIn")
        .addEventListener("click", () => map.zoomIn());

      document
        .getElementById("zoomOut")
        .addEventListener("click", () => map.zoomOut());

      document.getElementById("fitBounds").addEventListener("click", () => {
        map.fitBounds([
          [11.5, 74],
          [18.5, 78.5],
        ]);
      });

      // ---------------------------------
      // FORM EVENTS
      // ---------------------------------

      document
        .getElementById("featureForm")
        .addEventListener("submit", handleFeatureSubmit);

      document
        .getElementById("deleteFeature")
        .addEventListener("click", handleFeatureDelete);

      // ---------------------------------
      // INITIAL LOAD
      // ---------------------------------

      loadFeatures();
    </script>
  </body>
</html>
