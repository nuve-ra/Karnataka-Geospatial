version: "3.9"

services:
  db:
    image: postgis/postgis:16-3.4

    container_name: geodb

    environment:
      POSTGRES_USER: nupoor
      POSTGRES_PASSWORD: mypassword123
      POSTGRES_DB: geodb

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ..

      dockerfile: docker/Dockerfile

    container_name: fastapi_app

    depends_on:
      - db

    ports:
      - "8000:8000"

    environment:
      DATABASE_URL: postgresql://nupoor:mypassword123@db:5432/geodb

    volumes:
      - ..:/app

    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload

volumes:
  postgres_data:
